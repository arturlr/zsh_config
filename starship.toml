"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 5000

format = """
$os$username$aws $cmd_duration
$directory $git_branch $dotnet $golang $java $nodejs $python
$character
"""

[aws]
symbol = "ΌΝ╜ "
format = ' [$symbol($profile )(\($region\) )](bold yellow)'

[hostname]
ssh_only = false
format = '[$hostname](bold white) '
disabled = false

[username]
style_user = 'white bold'
style_root = 'red bold'
format = '[\[$user\]]($style)'
disabled = false
show_always = true

[cmd_duration]
format = 'took [$duration](bold white) '

[directory]
read_only = " ≤░Ν╛"
truncation_length = 3
truncation_symbol = "~/έΑο/"
truncate_to_repo = true

[localip]
ssh_only = true
format = '[$localipv4](bold) '
disabled = false

[docker_context]
symbol = "ΎΝΙ "

[git_branch]
symbol = "ΎΡα "

[golang]
symbol = "Όαπ "

[java]
symbol = "ΌΚΨ "

[kotlin]
